<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quadro de Recordes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Caveat+Brush&family=Kalam:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --art-width: 450px;
        --art-height: 800px;
        --art-scale: 1;
        --chalk: #f8f8f2;
        --board: #202427;
        --tape: rgba(13, 18, 23, 0.92);
        --wood-1: #e6c18a;
        --wood-2: #ba7d3e;
        --wood-3: #f3d9a8;
        --top-float-distance: 4px;
        --top-float-duration: 4.8s;
        --top-float-play-state: running;
        --list-float-distance: 2px;
        --list-float-duration: 5.2s;
        --list-float-play-state: running;
        --top-brightness-max: 1.32;
        --top-brightness-mid: 1.2;
        --top-brightness-shadow: 4px;
        --top-brightness-duration: 4.8s;
        --top-brightness-play-state: running;
        --list-brightness-max: 1.32;
        --list-brightness-mid: 1.2;
        --list-brightness-shadow: 3px;
        --list-brightness-duration: 4.8s;
        --list-brightness-play-state: running;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #111;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        color: var(--chalk);
        font-family: "Kalam", cursive;
      }

      .fit-shell {
        width: calc(var(--art-width) * var(--art-scale));
        height: calc(var(--art-height) * var(--art-scale));
        position: relative;
      }

      .frame {
        width: var(--art-width);
        height: var(--art-height);
        position: absolute;
        inset: 0;
        transform: scale(var(--art-scale));
        transform-origin: 0 0;
        overflow: hidden;
        border: 22px solid transparent;
        border-image: linear-gradient(135deg, var(--wood-3), var(--wood-1) 24%, var(--wood-2) 50%, var(--wood-3) 74%, var(--wood-2)) 22;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 16%, rgba(0, 0, 0, 0.16) 34%, transparent 52%, rgba(255, 255, 255, 0.18) 72%, rgba(0, 0, 0, 0.16)),
          #d8a566;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.8),
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 0 0 3px rgba(93, 54, 24, 0.42);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: -18px;
        pointer-events: none;
        background:
          repeating-linear-gradient(8deg, rgba(84, 46, 21, 0.2) 0 1px, transparent 1px 9px),
          repeating-linear-gradient(97deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 18px);
        mix-blend-mode: multiply;
        opacity: 0.75;
        animation: wood-light 7s ease-in-out infinite;
      }

      .board {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 24% 12%, rgba(255, 255, 255, 0.16), transparent 16%),
          radial-gradient(circle at 74% 42%, rgba(255, 255, 255, 0.08), transparent 19%),
          radial-gradient(circle at 42% 78%, rgba(255, 255, 255, 0.08), transparent 18%),
          repeating-linear-gradient(92deg, rgba(255, 255, 255, 0.02) 0 1px, transparent 1px 12px),
          linear-gradient(180deg, #171a1d, var(--board) 48%, #25292d);
        box-shadow:
          inset 0 0 0 2px rgba(0, 0, 0, 0.86),
          inset 0 0 36px rgba(0, 0, 0, 0.86);
      }

      .board::before,
      .board::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .board::before {
        background:
          radial-gradient(circle at 12% 88%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
          radial-gradient(circle at 84% 66%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
          radial-gradient(circle at 48% 38%, rgba(255, 255, 255, 0.12) 0 1px, transparent 2px);
        background-size: 63px 89px, 77px 93px, 91px 69px;
        opacity: 0.34;
        animation: chalk-dust 5s ease-in-out infinite;
      }

      .board::after {
        background: linear-gradient(115deg, transparent 0 42%, rgba(255, 255, 255, 0.1) 47%, transparent 56% 100%);
        opacity: 0.16;
        animation: light-sweep 6.5s ease-in-out infinite;
      }

      .header {
        position: absolute;
        left: 22px;
        top: 38px;
        width: 362px;
        height: 154px;
        color: var(--chalk);
      }

      .header > svg,
      .header .top-brightness > svg {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .top-brightness {
        position: absolute;
        inset: 0;
        --brightness-max: var(--top-brightness-max);
        --brightness-mid: var(--top-brightness-mid);
        --brightness-shadow: var(--top-brightness-shadow);
      }

      .title-row {
        position: absolute;
        left: 0;
        top: 0;
        width: 362px;
        height: 96px;
      }

      .title-arc {
        position: absolute;
        left: 0;
        top: 0;
        width: 362px;
        height: 96px;
      }

      .badge-mark {
        position: absolute;
        left: 152px;
        top: -18px;
        width: 58px;
        height: 78px;
      }

      .podium-mark {
        position: absolute;
        left: 56px;
        top: 83px;
        width: 250px;
        height: 82px;
      }

      .badge-mark svg,
      .podium-mark svg,
      .title-arc svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }

      .header text {
        fill: var(--chalk);
        font-family: "Amatic SC", cursive;
        font-weight: 400;
        letter-spacing: 1.4px;
        filter: url("#chalky");
      }

      .header .rank {
        font-size: 34px;
        font-weight: 700;
      }

      .title-arc text {
        font-size: 49px;
        font-weight: 400;
        letter-spacing: 1.1px;
      }

      .title-arc path {
        stroke: none;
        filter: none;
      }

      .header path,
      .header line,
      .header circle {
        fill: none;
        stroke: var(--chalk);
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url("#chalky");
      }

      .header .thin {
        stroke-width: 2.2;
      }

      .header .medium {
        stroke-width: 3;
      }

      .header .ray {
        stroke-width: 2.8;
        animation: ray-morph 2.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .top-float-item {
        transform-box: fill-box;
        transform-origin: center;
      }

      .frame[data-top-float="0"] .header {
        animation: top-float-same var(--top-float-duration) ease-in-out infinite;
        animation-play-state: var(--top-float-play-state);
      }

      .frame[data-top-float="1"] .top-float-item {
        animation-duration: var(--top-float-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-play-state: var(--top-float-play-state);
      }

      .frame[data-top-float="1"] .top-float-a {
        animation-name: top-float-a;
      }

      .frame[data-top-float="1"] .top-float-b {
        animation-name: top-float-b;
        animation-delay: calc(var(--top-float-duration) * -0.22);
      }

      .frame[data-top-float="1"] .top-float-c {
        animation-name: top-float-c;
        animation-delay: calc(var(--top-float-duration) * -0.44);
      }

      .frame[data-top-bright="0"] .top-brightness {
        filter: none;
      }

      .frame[data-top-bright="1"] .top-brightness {
        filter: brightness(var(--top-brightness-max)) drop-shadow(0 0 var(--top-brightness-shadow) rgba(255, 255, 255, 0.42));
      }

      .frame[data-top-bright="2"] .top-brightness {
        animation-duration: var(--top-brightness-duration);
        animation-iteration-count: infinite;
        animation-play-state: var(--top-brightness-play-state);
      }

      .frame[data-top-bright="2"][data-top-bright-type="1"] .top-brightness {
        animation-name: brightness-wave;
        animation-timing-function: ease-in-out;
      }

      .frame[data-top-bright="2"][data-top-bright-type="2"] .top-brightness {
        animation-name: brightness-square;
        animation-timing-function: steps(1, end);
      }

      .frame[data-top-bright="2"][data-top-bright-type="3"] .top-brightness {
        animation-name: brightness-square-variant;
        animation-timing-function: steps(1, end);
      }

      .frame[data-top-bright="2"][data-top-bright-type="4"] .top-brightness {
        animation-name: brightness-triangle;
        animation-timing-function: linear;
      }

      .podium-column {
        fill: transparent;
        stroke: var(--chalk);
        stroke-width: 3;
      }

      .rank {
        filter: url("#chalky");
      }

      .ray-left:nth-of-type(1),
      .ray-right:nth-of-type(4) {
        animation-delay: -0.4s;
      }

      .ray-left:nth-of-type(2),
      .ray-right:nth-of-type(5) {
        animation-delay: -1s;
      }

      .ray-left:nth-of-type(3),
      .ray-right:nth-of-type(6) {
        animation-delay: -1.6s;
      }

      .entries {
        position: absolute;
        left: 32px;
        top: 202px;
        width: 350px;
        display: grid;
        gap: 3px;
      }

      .entry {
        height: 72px;
        position: relative;
      }

      .entry-brightness {
        position: absolute;
        inset: 0;
        --brightness-max: var(--list-brightness-max);
        --brightness-mid: var(--list-brightness-mid);
        --brightness-shadow: var(--list-brightness-shadow);
      }

      .entry:nth-child(2n) {
        animation-delay: -1.1s;
      }

      .entry:nth-child(3n) {
        animation-delay: -2.2s;
      }

      .icon-label {
        position: absolute;
        left: 0;
        width: 27px;
        height: 27px;
        color: var(--chalk);
        filter: drop-shadow(0.7px 0 0 rgba(255, 255, 255, 0.58));
      }

      .icon-label svg {
        width: 100%;
        height: 100%;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon-room {
        top: 3px;
      }

      .icon-team {
        top: 36px;
      }

      .icon-time {
        left: auto;
        right: 79px;
        top: 35px;
      }

      .tape {
        position: absolute;
        height: 29px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        overflow: hidden;
        color: var(--chalk);
        background:
          linear-gradient(100deg, rgba(255, 255, 255, 0.04), transparent 28%, rgba(255, 255, 255, 0.07) 58%, transparent),
          var(--tape);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.025),
          0 2px 4px rgba(0, 0, 0, 0.38);
        transform: skewX(-1deg);
      }

      .frame[data-list-bright="0"] .entry-brightness {
        filter: none;
      }

      .frame[data-list-bright="1"] .entry-brightness {
        filter: brightness(var(--list-brightness-max)) drop-shadow(0 0 var(--list-brightness-shadow) rgba(255, 255, 255, 0.34));
      }

      .frame[data-list-bright="2"] .entry-brightness {
        animation-duration: var(--list-brightness-duration);
        animation-iteration-count: infinite;
        animation-play-state: var(--list-brightness-play-state);
      }

      .frame[data-list-bright="2"] .entry:nth-child(2n) .entry-brightness {
        animation-delay: calc(var(--list-brightness-duration) * -0.18);
      }

      .frame[data-list-bright="2"] .entry:nth-child(3n) .entry-brightness {
        animation-delay: calc(var(--list-brightness-duration) * -0.36);
      }

      .frame[data-list-bright="2"][data-list-bright-type="1"] .entry-brightness {
        animation-name: brightness-wave;
        animation-timing-function: ease-in-out;
      }

      .frame[data-list-bright="2"][data-list-bright-type="2"] .entry-brightness {
        animation-name: brightness-square;
        animation-timing-function: steps(1, end);
      }

      .frame[data-list-bright="2"][data-list-bright-type="3"] .entry-brightness {
        animation-name: brightness-square-variant;
        animation-timing-function: steps(1, end);
      }

      .frame[data-list-bright="2"][data-list-bright-type="4"] .entry-brightness {
        animation-name: brightness-triangle;
        animation-timing-function: linear;
      }

      .frame[data-list-float="0"] .entries {
        animation: list-float-same var(--list-float-duration) ease-in-out infinite;
        animation-play-state: var(--list-float-play-state);
      }

      .frame[data-list-float="1"] .list-float-item {
        animation-duration: var(--list-float-duration);
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-play-state: var(--list-float-play-state);
      }

      .frame[data-list-float="1"] .list-float-a {
        animation-name: list-float-a;
      }

      .frame[data-list-float="1"] .list-float-b {
        animation-name: list-float-b;
        animation-delay: calc(var(--list-float-duration) * -0.18);
      }

      .frame[data-list-float="1"] .list-float-c {
        animation-name: list-float-c;
        animation-delay: calc(var(--list-float-duration) * -0.36);
      }

      .frame[data-list-float="1"] .tape.list-float-a {
        animation-name: list-float-tape-a;
      }

      .frame[data-list-float="1"] .tape.list-float-b {
        animation-name: list-float-tape-b;
      }

      .frame[data-list-float="1"] .tape.list-float-c {
        animation-name: list-float-tape-c;
      }

      .frame[data-list-float="2"] .entry {
        animation: entry-drift var(--list-float-duration) ease-in-out infinite;
        animation-play-state: var(--list-float-play-state);
      }

      .frame[data-list-float="2"] .entry:nth-child(2n) {
        animation-name: entry-drift-alt;
      }

      .frame[data-list-float="2"] .entry:nth-child(3n) {
        animation-name: entry-drift-third;
      }

      .frame[data-list-float="0"] .icon-label,
      .frame[data-list-float="2"] .icon-label {
        animation: icon-breathe 3.4s ease-in-out infinite;
      }

      .room-value {
        left: 39px;
        top: 0;
        width: 300px;
      }

      .team-value {
        left: 39px;
        top: 33px;
        width: 195px;
      }

      .time-value {
        right: 0;
        top: 33px;
        width: 72px;
        justify-content: center;
      }

      .chalk-text {
        display: block;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        color: var(--chalk);
        font-family: "Kalam", cursive;
        font-size: 22px;
        line-height: 1;
        text-overflow: clip;
        text-shadow:
          0.5px 0 rgba(255, 255, 255, 0.56),
          -0.4px 0 rgba(255, 255, 255, 0.32);
        animation: handwritten-pulse 3.7s ease-in-out infinite;
      }

      .room-value .chalk-text {
        font-family: "Caveat Brush", cursive;
        font-size: 31px;
        text-transform: none;
      }

      .room-value[data-style="plain"] .chalk-text,
      .team-value .chalk-text,
      .time-value .chalk-text {
        font-family: "Kalam", cursive;
        font-size: 21px;
      }

      .time-value .chalk-text {
        font-size: 21px;
        text-align: center;
      }

      .header,
      .entries {
        transition:
          opacity 0.72s ease,
          transform 0.72s ease,
          filter 0.72s ease;
      }

      .frame.show-photo .header,
      .frame.show-photo .podium-mark,
      .frame.show-photo .entries {
        opacity: 0;
        transform: translateY(-12px) scale(0.98);
        filter: blur(3px);
      }

      .photo-view {
        position: absolute;
        inset: 0;
        z-index: 3;
        opacity: 0;
        overflow: hidden;
        pointer-events: none;
        clip-path: inset(0 100% 0 0);
        transition:
          clip-path 1.08s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.42s ease;
      }

      .frame.show-photo .photo-view {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }

      .photo-view::before,
      .photo-view::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .photo-view::before {
        z-index: 1;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.58), transparent 28%, transparent 58%, rgba(0, 0, 0, 0.7)),
          radial-gradient(circle at 50% 36%, transparent 0 38%, rgba(0, 0, 0, 0.36) 76%);
      }

      .photo-view::after {
        z-index: 2;
        background:
          repeating-linear-gradient(92deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 13px),
          linear-gradient(115deg, transparent 0 44%, rgba(255, 255, 255, 0.12) 48%, transparent 58% 100%);
        opacity: 0.35;
        animation: light-sweep 6.5s ease-in-out infinite;
      }

      .photo-image {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transform: scale(1.04);
        transition: transform 5s ease;
      }

      .frame.show-photo .photo-image {
        transform: scale(1);
      }

      .photo-title {
        position: absolute;
        z-index: 4;
        left: 24px;
        right: 24px;
        top: 44px;
        margin: 0;
        color: var(--chalk);
        font-family: "Amatic SC", cursive;
        font-size: 64px;
        font-weight: 700;
        line-height: 0.9;
        text-align: center;
        letter-spacing: 1.4px;
        filter: drop-shadow(0 3px 0 rgba(0, 0, 0, 0.5));
        text-shadow:
          0.7px 0 rgba(255, 255, 255, 0.6),
          -0.5px 0 rgba(255, 255, 255, 0.35),
          0 0 10px rgba(0, 0, 0, 0.72);
        animation: float-title 5s ease-in-out infinite;
      }

      .photo-info {
        position: absolute;
        z-index: 4;
        left: 28px;
        right: 28px;
        bottom: 40px;
        display: grid;
        gap: 9px;
        animation: entry-drift 5.2s ease-in-out infinite;
      }

      .photo-row {
        position: relative;
        min-height: 44px;
        display: grid;
        grid-template-columns: 34px 1fr;
        align-items: center;
        gap: 8px;
      }

      .photo-row:nth-child(2) {
        animation: entry-drift 5.4s ease-in-out infinite -1.1s;
      }

      .photo-row:nth-child(3) {
        animation: entry-drift 5.6s ease-in-out infinite -2.2s;
      }

      .photo-icon {
        position: static;
        width: 30px;
        height: 30px;
      }

      .photo-tape {
        position: relative;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5px 14px 4px;
        overflow: hidden;
        color: var(--chalk);
        background:
          linear-gradient(100deg, rgba(255, 255, 255, 0.05), transparent 28%, rgba(255, 255, 255, 0.08) 58%, transparent),
          var(--tape);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.035),
          0 3px 7px rgba(0, 0, 0, 0.48);
        transform: skewX(-1deg);
        animation: tape-glow 4.5s ease-in-out infinite;
      }

      .photo-tape .chalk-text {
        font-size: 28px;
        line-height: 1.05;
        text-align: center;
      }

      .photo-room .chalk-text {
        font-family: "Caveat Brush", cursive;
        font-size: 36px;
      }

      .photo-time .chalk-text {
        font-size: 34px;
        font-weight: 700;
      }

      .screen-wipe {
        position: absolute;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent, rgba(248, 248, 242, 0.18) 18%, rgba(248, 248, 242, 0.76) 48%, rgba(248, 248, 242, 0.12) 78%, transparent);
        opacity: 0;
        transform: translateX(-120%);
      }

      .frame.is-wiping .screen-wipe {
        animation: board-wipe 1.15s ease-in-out;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes wood-light {
        0%,
        100% {
          opacity: 0.62;
          transform: translateX(0);
        }
        50% {
          opacity: 0.92;
          transform: translateX(5px);
        }
      }

      @keyframes chalk-dust {
        0%,
        100% {
          opacity: 0.23;
          transform: translate(0, 0);
        }
        50% {
          opacity: 0.43;
          transform: translate(2px, -2px);
        }
      }

      @keyframes top-float-same {
        0%,
        100% {
          transform: translate(0, 0) rotate(-0.12deg);
        }
        50% {
          transform: translate(var(--top-float-distance), calc(var(--top-float-distance) * -0.75)) rotate(0.12deg);
        }
      }

      @keyframes top-float-a {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(var(--top-float-distance), calc(var(--top-float-distance) * -0.55));
        }
      }

      @keyframes top-float-b {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(calc(var(--top-float-distance) * -0.75), var(--top-float-distance));
        }
      }

      @keyframes top-float-c {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(calc(var(--top-float-distance) * 0.42), calc(var(--top-float-distance) * 0.85));
        }
      }

      @keyframes list-float-same {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {

    <script>
      const artWidth = 450;
      const artHeight = 800;
      const maxRooms = 7;
      const boardDuration = 11000;
      const photoDuration = 6000;
      const transitionDuration = 1150;
      const fallbackConfig = {
        roomCount: 7,
        designNumber: 1,
        topFloat: { mode: 1, strength: 1, speed: 1 },
        listFloat: { mode: 2, strength: 1, speed: 1 },
        topBrightness: { active: 2, strength: 1, type: 1, speed: 1 },
        listBrightness: { active: 2, strength: 1, type: 1, speed: 1 },
      };
      const fallbackRecords = [
        { id: "1", room: "Emboscada", team: "Vigil-Antes", time: "32:43", style: "plain" },
        { id: "2", room: "", team: "", time: "", style: "plain" },
        { id: "3", room: "Mundo Invertido", team: "Kuro-obi-pe", time: "27:26", style: "script" },
        { id: "4", room: "A Maldição Pirata", team: "Normal com Bacon", time: "42:26", style: "script" },
        { id: "5", room: "T-Vírus", team: "Só Domi", time: "39:29", style: "script" },
        { id: "6", room: "Wandinha", team: "Tramuz B12", time: "35:19", style: "script" },
        { id: "7", room: "Excalibur", team: "", time: "", style: "script" },
      ];
      let activePhotoRecords = [];
      let photoIndex = 0;
      let cycleTimer = 0;

      function fitBoard() {
        const viewport = window.visualViewport || window;
        const scale = Math.min(viewport.width / artWidth, viewport.height / artHeight);
        document.documentElement.style.setProperty("--art-scale", Math.max(scale, 0.1).toFixed(4));
      }

      function textFrom(node, selector) {
        return node.querySelector(selector)?.textContent.trim() || "";
      }

      function numberFromXml(xml, selectors, fallback) {
        for (const selector of selectors) {
          const node = xml.querySelector(selector);
          if (!node) continue;
          const value = node.getAttribute("quantidade") || node.getAttribute("numero") || node.textContent;
          const number = Number.parseInt(value, 10);
          if (Number.isFinite(number)) return number;
        }
        return fallback;
      }

      function clampNumber(value, min, max, fallback) {
        const number = Number.parseFloat(value);
        if (!Number.isFinite(number)) return fallback;
        return Math.min(Math.max(number, min), max);
      }

      function numberFromSection(section, selectors, attributes, fallback) {
        if (!section) return fallback;
        for (const attribute of attributes) {
          const value = section.getAttribute(attribute);
          if (value !== null && value !== "") return value;
        }
        for (const selector of selectors) {
          const node = section.querySelector(selector);
          if (!node) continue;
          for (const attribute of attributes) {
            const value = node.getAttribute(attribute);
            if (value !== null && value !== "") return value;
          }
          const text = node.textContent.trim();
          if (text) return text;
        }
        return fallback;
      }

      function clampRoomCount(value) {
        return Math.min(Math.max(Number.parseInt(value, 10) || fallbackConfig.roomCount, 1), maxRooms);
      }

      function floatConfigFromSection(section, fallback, maxMode) {
        return {
          mode: Math.round(clampNumber(numberFromSection(section, ["floatIndividual"], ["floatIndividual", "valor", "value", "modo", "mode"], fallback.mode), 0, maxMode, fallback.mode)),
          strength: clampNumber(numberFromSection(section, ["forcaFloat"], ["forcaFloat", "valor", "value", "forca", "strength"], fallback.strength), 0, 2, fallback.strength),
          speed: clampNumber(numberFromSection(section, ["velocidadeFloat"], ["velocidadeFloat", "valor", "value", "velocidade", "speed"], fallback.speed), 0, 2, fallback.speed),
        };
      }

      function brightnessConfigFromSection(section, fallback) {
        return {
          active: Math.round(clampNumber(numberFromSection(section, ["brilhoSempreAtivo", "brilhoAtivo"], ["brilhoSempreAtivo", "brilhoAtivo", "active", "ativo", "valor", "value"], fallback.active), 0, 2, fallback.active)),
          strength: clampNumber(numberFromSection(section, ["forcaBrilhoMaxima"], ["forcaBrilhoMaxima", "strength", "forca", "valor", "value"], fallback.strength), 0, 2, fallback.strength),
          type: Math.round(clampNumber(numberFromSection(section, ["tipoBrilho"], ["tipoBrilho", "type", "tipo", "valor", "value"], fallback.type), 1, 4, fallback.type)),
          speed: clampNumber(numberFromSection(section, ["velocidadeWaveBrilho"], ["velocidadeWaveBrilho", "speed", "velocidade", "valor", "value"], fallback.speed), 0, 2, fallback.speed),
        };
      }

      function configFromXml(xml) {
        const topSection = xml.querySelector("topo, controlesTopo, topControls");
        const listSection = xml.querySelector("lista, controleLista, listControls");
        return {
          roomCount: clampRoomCount(numberFromXml(xml, ["salas", "rooms", "roomCount"], fallbackConfig.roomCount)),
          designNumber: Math.max(numberFromXml(xml, ["design", "topDesign"], fallbackConfig.designNumber), 1),
          topFloat: floatConfigFromSection(topSection, fallbackConfig.topFloat, 1),
          listFloat: floatConfigFromSection(listSection, fallbackConfig.listFloat, 2),
          topBrightness: brightnessConfigFromSection(topSection, fallbackConfig.topBrightness),
          listBrightness: brightnessConfigFromSection(listSection, fallbackConfig.listBrightness),
        };
      }

      function setFloatVariables(prefix, config, baseDistance, baseDuration) {
        const root = document.documentElement;
        const isMoving = config.strength > 0 && config.speed > 0;
        const duration = isMoving ? baseDuration / config.speed : baseDuration;
        root.style.setProperty(`--${prefix}-float-distance`, `${baseDistance * config.strength}px`);
        root.style.setProperty(`--${prefix}-float-duration`, `${duration.toFixed(2)}s`);
        root.style.setProperty(`--${prefix}-float-play-state`, isMoving ? "running" : "paused");
      }

      function setBrightnessVariables(prefix, config, baseDuration) {
        const root = document.documentElement;
        const isAnimated = config.active === 2 && config.strength > 0 && config.speed > 0;
        const duration = isAnimated ? baseDuration / config.speed : baseDuration;
        const max = 1 + config.strength * 0.32;
        const mid = 1 + config.strength * 0.2;
        root.style.setProperty(`--${prefix}-brightness-max`, max.toFixed(3));
        root.style.setProperty(`--${prefix}-brightness-mid`, mid.toFixed(3));
        root.style.setProperty(`--${prefix}-brightness-shadow`, `${(config.strength * 5).toFixed(2)}px`);
        root.style.setProperty(`--${prefix}-brightness-duration`, `${duration.toFixed(2)}s`);
        root.style.setProperty(`--${prefix}-brightness-play-state`, isAnimated ? "running" : "paused");
      }

      function applyConfig(config) {
        const frame = document.querySelector(".frame");
        frame.dataset.topFloat = config.topFloat.mode.toString();
        frame.dataset.listFloat = config.listFloat.mode.toString();
        frame.dataset.topBright = config.topBrightness.active.toString();
        frame.dataset.topBrightType = config.topBrightness.type.toString();
        frame.dataset.listBright = config.listBrightness.active.toString();
        frame.dataset.listBrightType = config.listBrightness.type.toString();
        setFloatVariables("top", config.topFloat, 4, 4.8);
        setFloatVariables("list", config.listFloat, 2, 5.2);
        setBrightnessVariables("top", config.topBrightness, 4.8);
        setBrightnessVariables("list", config.listBrightness, 4.8);
      }

      function recordsFromXml(xml) {
        return [...xml.querySelectorAll("record")].map((record) => ({
          id: record.getAttribute("id") || textFrom(record, "id"),
          room: textFrom(record, "room"),
          team: textFrom(record, "team"),
          time: textFrom(record, "time"),
          style: record.getAttribute("style") || "script",
        }));
      }

      function applyTextFit(element, value, baseSize) {
        element.textContent = value;
        element.style.fontSize = `${baseSize}px`;
        requestAnimationFrame(() => {
          let size = baseSize;
          while (element.scrollWidth > element.clientWidth && size > 12) {
            size -= 1;
            element.style.fontSize = `${size}px`;
          }
        });
      }

      async function fetchTextFile(path) {
        const url = new URL(path, window.location.href);
        url.searchParams.set("v", Date.now().toString());
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`${path} nao encontrado`);
        return response.text();
      }

      async function loadConfig() {
        try {
          const text = await fetchTextFile("config.xml");
          const xml = new DOMParser().parseFromString(text, "application/xml");
          return configFromXml(xml);
        } catch (error) {
          return fallbackConfig;
        }
      }

      async function loadTopDesign(designNumber) {
        const header = document.querySelector("#top-design");
        let designHtml = "";
        try {
          designHtml = await fetchTextFile(`design-${designNumber}.html`);
        } catch (error) {
          try {
            designHtml = await fetchTextFile("design-1.html");
          } catch (fallbackError) {
            designHtml = document.querySelector("#top-design-fallback")?.innerHTML || "";
          }
        }
        header.innerHTML = `<div class="top-brightness">${designHtml}</div>`;
      }

      function renderRecords(records, roomCount) {
        const entries = document.querySelector("#entries");
        const template = document.querySelector("#entry-template");
        entries.replaceChildren();
        records.slice(0, roomCount).forEach((record) => {
          const fragment = template.content.cloneNode(true);
          const article = fragment.querySelector(".entry");
          const roomTape = fragment.querySelector(".room-value");
          const room = fragment.querySelector('[data-field="room"]');
          const team = fragment.querySelector('[data-field="team"]');
          const time = fragment.querySelector('[data-field="time"]');
          roomTape.dataset.style = record.style || "script";
          applyTextFit(room, record.room, record.style === "plain" ? 22 : 31);
          applyTextFit(team, record.team, 21);
          applyTextFit(time, record.time, 21);
          if (!record.room && !record.team && !record.time) {
            article.classList.add("is-empty");
          }
          entries.appendChild(fragment);
        });
      }

      function isActivePhotoRecord(record, roomCount) {
        const id = Number.parseInt(record.id, 10);
        return id >= 1 && id <= roomCount && record.room.trim() && record.team.trim() && record.time.trim();
      }

      function setPhotoRecord(record) {
        const photo = document.querySelector("#record-photo");
        const room = document.querySelector("#photo-room");
        const team = document.querySelector("#photo-team");
        const time = document.querySelector("#photo-time");
        const id = Number.parseInt(record.id, 10);
        const candidates = [`fotos/${id}.jpeg`, `fotos/${id}.png`, `fotos/${id}.jpg`];
        let candidateIndex = 0;
        photo.onerror = () => {
          candidateIndex += 1;
          if (candidateIndex < candidates.length) {
            photo.src = candidates[candidateIndex];
          }
        };
        photo.src = candidates[candidateIndex];
        photo.alt = `Foto da equipe recordista da sala ${record.room}`;
        applyTextFit(room, record.room, record.style === "plain" ? 28 : 36);
        applyTextFit(team, record.team, 28);
        applyTextFit(time, record.time, 34);
      }

      function runWipe() {
        const frame = document.querySelector(".frame");
        frame.classList.remove("is-wiping");
        void frame.offsetWidth;
        frame.classList.add("is-wiping");
      }

      function showBoard() {
        const frame = document.querySelector(".frame");
        runWipe();
        window.setTimeout(() => {
          frame.classList.remove("show-photo");
          schedulePhotoCycle(boardDuration);
        }, transitionDuration * 0.45);
      }

      function showNextPhoto() {
        const frame = document.querySelector(".frame");
        const record = activePhotoRecords[photoIndex % activePhotoRecords.length];
        photoIndex += 1;
        setPhotoRecord(record);
        runWipe();
        window.setTimeout(() => {
          frame.classList.add("show-photo");
          cycleTimer = window.setTimeout(showBoard, photoDuration);
        }, transitionDuration * 0.45);
      }

      function schedulePhotoCycle(delay) {
        window.clearTimeout(cycleTimer);
        if (!activePhotoRecords.length) return;
        cycleTimer = window.setTimeout(showNextPhoto, delay);
      }

      function startPhotoCycle(records, roomCount) {
        const frame = document.querySelector(".frame");
        activePhotoRecords = records.filter((record) => isActivePhotoRecord(record, roomCount));
        photoIndex = 0;
        window.clearTimeout(cycleTimer);
        frame.classList.remove("show-photo", "is-wiping");
        schedulePhotoCycle(boardDuration);
      }

      async function loadRecords() {
        const config = await loadConfig();
        applyConfig(config);
        await loadTopDesign(config.designNumber);
        try {
          const text = await fetchTextFile("records.xml");
          const xml = new DOMParser().parseFromString(text, "application/xml");
          const records = recordsFromXml(xml);
          const sourceRecords = records.length ? records : fallbackRecords;
          renderRecords(sourceRecords, config.roomCount);
          startPhotoCycle(sourceRecords, config.roomCount);
        } catch (error) {
          renderRecords(fallbackRecords, config.roomCount);
          startPhotoCycle(fallbackRecords, config.roomCount);
        }
      }

      fitBoard();
      loadRecords();
      window.addEventListener("resize", fitBoard);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitBoard);
      }
    </script>
  </body>
</html>
