<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quadro de Recordes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Caveat+Brush&family=Kalam:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --art-width: 450px;
        --art-height: 800px;
        --art-scale: 1;
        --chalk: #f8f8f2;
        --board: #202427;
        --tape: rgba(13, 18, 23, 0.92);
        --wood-1: #e6c18a;
        --wood-2: #ba7d3e;
        --wood-3: #f3d9a8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #111;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        color: var(--chalk);
        font-family: "Kalam", cursive;
      }

      .fit-shell {
        width: calc(var(--art-width) * var(--art-scale));
        height: calc(var(--art-height) * var(--art-scale));
        position: relative;
      }

      .frame {
        width: var(--art-width);
        height: var(--art-height);
        position: absolute;
        inset: 0;
        transform: scale(var(--art-scale));
        transform-origin: 0 0;
        overflow: hidden;
        border: 22px solid transparent;
        border-image: linear-gradient(135deg, var(--wood-3), var(--wood-1) 24%, var(--wood-2) 50%, var(--wood-3) 74%, var(--wood-2)) 22;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 16%, rgba(0, 0, 0, 0.16) 34%, transparent 52%, rgba(255, 255, 255, 0.18) 72%, rgba(0, 0, 0, 0.16)),
          #d8a566;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.8),
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 0 0 3px rgba(93, 54, 24, 0.42);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: -18px;
        pointer-events: none;
        background:
          repeating-linear-gradient(8deg, rgba(84, 46, 21, 0.2) 0 1px, transparent 1px 9px),
          repeating-linear-gradient(97deg, rgba(255, 255, 255, 0.14) 0 1px, transparent 1px 18px);
        mix-blend-mode: multiply;
        opacity: 0.75;
        animation: wood-light 7s ease-in-out infinite;
      }

      .board {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 24% 12%, rgba(255, 255, 255, 0.16), transparent 16%),
          radial-gradient(circle at 74% 42%, rgba(255, 255, 255, 0.08), transparent 19%),
          radial-gradient(circle at 42% 78%, rgba(255, 255, 255, 0.08), transparent 18%),
          repeating-linear-gradient(92deg, rgba(255, 255, 255, 0.02) 0 1px, transparent 1px 12px),
          linear-gradient(180deg, #171a1d, var(--board) 48%, #25292d);
        box-shadow:
          inset 0 0 0 2px rgba(0, 0, 0, 0.86),
          inset 0 0 36px rgba(0, 0, 0, 0.86);
      }

      .board::before,
      .board::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .board::before {
        background:
          radial-gradient(circle at 12% 88%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
          radial-gradient(circle at 84% 66%, rgba(255, 255, 255, 0.14) 0 1px, transparent 2px),
          radial-gradient(circle at 48% 38%, rgba(255, 255, 255, 0.12) 0 1px, transparent 2px);
        background-size: 63px 89px, 77px 93px, 91px 69px;
        opacity: 0.34;
        animation: chalk-dust 5s ease-in-out infinite;
      }

      .board::after {
        background: linear-gradient(115deg, transparent 0 42%, rgba(255, 255, 255, 0.1) 47%, transparent 56% 100%);
        opacity: 0.16;
        animation: light-sweep 6.5s ease-in-out infinite;
      }

      .header {
        position: absolute;
        left: 22px;
        top: 38px;
        width: 362px;
        height: 154px;
        color: var(--chalk);
        animation: chalk-wobble 4s ease-in-out infinite, header-luma 5.6s ease-in-out infinite;
      }

      .header > svg {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .title-row {
        position: absolute;
        left: 0;
        top: 0;
        width: 362px;
        height: 96px;
      }

      .title-arc {
        position: absolute;
        left: 0;
        top: 0;
        width: 362px;
        height: 96px;
        animation: float-title 5s ease-in-out infinite;
      }

      .badge-mark {
        position: absolute;
        left: 152px;
        top: -18px;
        width: 58px;
        height: 78px;
        animation: float-badge 4.3s ease-in-out infinite;
      }

      .podium-mark {
        position: absolute;
        left: 56px;
        top: 83px;
        width: 250px;
        height: 82px;
        animation: float-podium 4.7s ease-in-out infinite;
      }

      .badge-mark svg,
      .podium-mark svg,
      .title-arc svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }

      .header text {
        fill: var(--chalk);
        font-family: "Amatic SC", cursive;
        font-weight: 400;
        letter-spacing: 1.4px;
        filter: url("#chalky");
      }

      .header .rank {
        font-size: 34px;
        font-weight: 700;
      }

      .title-arc text {
        font-size: 49px;
        font-weight: 400;
        letter-spacing: 1.1px;
      }

      .title-arc path {
        stroke: none;
        filter: none;
      }

      .header path,
      .header line,
      .header circle {
        fill: none;
        stroke: var(--chalk);
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url("#chalky");
      }

      .header .thin {
        stroke-width: 2.2;
      }

      .header .medium {
        stroke-width: 3;
      }

      .header .ray {
        stroke-width: 2.8;
        animation: ray-morph 2.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .podium-column {
        fill: transparent;
        stroke: var(--chalk);
        stroke-width: 3;
      }

      .rank {
        filter: url("#chalky");
      }

      .ray-left:nth-of-type(1),
      .ray-right:nth-of-type(4) {
        animation-delay: -0.4s;
      }

      .ray-left:nth-of-type(2),
      .ray-right:nth-of-type(5) {
        animation-delay: -1s;
      }

      .ray-left:nth-of-type(3),
      .ray-right:nth-of-type(6) {
        animation-delay: -1.6s;
      }

      .entries {
        position: absolute;
        left: 32px;
        top: 202px;
        width: 350px;
        display: grid;
        gap: 3px;
      }

      .entry {
        height: 72px;
        position: relative;
        animation: entry-drift 5.2s ease-in-out infinite;
      }

      .entry:nth-child(2n) {
        animation-delay: -1.1s;
      }

      .entry:nth-child(3n) {
        animation-delay: -2.2s;
      }

      .icon-label {
        position: absolute;
        left: 0;
        width: 27px;
        height: 27px;
        color: var(--chalk);
        filter: drop-shadow(0.7px 0 0 rgba(255, 255, 255, 0.58));
        animation: icon-breathe 3.4s ease-in-out infinite;
      }

      .icon-label svg {
        width: 100%;
        height: 100%;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon-room {
        top: 3px;
      }

      .icon-team {
        top: 36px;
      }

      .icon-time {
        left: auto;
        right: 79px;
        top: 35px;
      }

      .tape {
        position: absolute;
        height: 29px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        overflow: hidden;
        color: var(--chalk);
        background:
          linear-gradient(100deg, rgba(255, 255, 255, 0.04), transparent 28%, rgba(255, 255, 255, 0.07) 58%, transparent),
          var(--tape);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.025),
          0 2px 4px rgba(0, 0, 0, 0.38);
        transform: skewX(-1deg);
        animation: tape-glow 4.5s ease-in-out infinite;
      }

      .room-value {
        left: 39px;
        top: 0;
        width: 300px;
      }

      .team-value {
        left: 39px;
        top: 33px;
        width: 195px;
      }

      .time-value {
        right: 0;
        top: 33px;
        width: 72px;
        justify-content: center;
      }

      .chalk-text {
        display: block;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        color: var(--chalk);
        font-family: "Kalam", cursive;
        font-size: 22px;
        line-height: 1;
        text-overflow: clip;
        text-shadow:
          0.5px 0 rgba(255, 255, 255, 0.56),
          -0.4px 0 rgba(255, 255, 255, 0.32);
        animation: handwritten-pulse 3.7s ease-in-out infinite;
      }

      .room-value .chalk-text {
        font-family: "Caveat Brush", cursive;
        font-size: 31px;
        text-transform: none;
      }

      .room-value[data-style="plain"] .chalk-text,
      .team-value .chalk-text,
      .time-value .chalk-text {
        font-family: "Kalam", cursive;
        font-size: 21px;
      }

      .time-value .chalk-text {
        font-size: 21px;
        text-align: center;
      }

      .header,
      .entries {
        transition:
          opacity 0.72s ease,
          transform 0.72s ease,
          filter 0.72s ease;
      }

      .frame.show-photo .header,
      .frame.show-photo .podium-mark,
      .frame.show-photo .entries {
        opacity: 0;
        transform: translateY(-12px) scale(0.98);
        filter: blur(3px);
      }

      .photo-view {
        position: absolute;
        inset: 0;
        z-index: 3;
        opacity: 0;
        overflow: hidden;
        pointer-events: none;
        clip-path: inset(0 100% 0 0);
        transition:
          clip-path 1.08s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.42s ease;
      }

      .frame.show-photo .photo-view {
        opacity: 1;
        clip-path: inset(0 0 0 0);
      }

      .photo-view::before,
      .photo-view::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .photo-view::before {
        z-index: 1;
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.58), transparent 28%, transparent 58%, rgba(0, 0, 0, 0.7)),
          radial-gradient(circle at 50% 36%, transparent 0 38%, rgba(0, 0, 0, 0.36) 76%);
      }

      .photo-view::after {
        z-index: 2;
        background:
          repeating-linear-gradient(92deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 13px),
          linear-gradient(115deg, transparent 0 44%, rgba(255, 255, 255, 0.12) 48%, transparent 58% 100%);
        opacity: 0.35;
        animation: light-sweep 6.5s ease-in-out infinite;
      }

      .photo-image {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transform: scale(1.04);
        transition: transform 5s ease;
      }

      .frame.show-photo .photo-image {
        transform: scale(1);
      }

      .photo-title {
        position: absolute;
        z-index: 4;
        left: 24px;
        right: 24px;
        top: 44px;
        margin: 0;
        color: var(--chalk);
        font-family: "Amatic SC", cursive;
        font-size: 64px;
        font-weight: 700;
        line-height: 0.9;
        text-align: center;
        letter-spacing: 1.4px;
        filter: drop-shadow(0 3px 0 rgba(0, 0, 0, 0.5));
        text-shadow:
          0.7px 0 rgba(255, 255, 255, 0.6),
          -0.5px 0 rgba(255, 255, 255, 0.35),
          0 0 10px rgba(0, 0, 0, 0.72);
        animation: float-title 5s ease-in-out infinite;
      }

      .photo-info {
        position: absolute;
        z-index: 4;
        left: 28px;
        right: 28px;
        bottom: 40px;
        display: grid;
        gap: 9px;
        animation: entry-drift 5.2s ease-in-out infinite;
      }

      .photo-row {
        position: relative;
        min-height: 44px;
        display: grid;
        grid-template-columns: 34px 1fr;
        align-items: center;
        gap: 8px;
      }

      .photo-row:nth-child(2) {
        animation: entry-drift 5.4s ease-in-out infinite -1.1s;
      }

      .photo-row:nth-child(3) {
        animation: entry-drift 5.6s ease-in-out infinite -2.2s;
      }

      .photo-icon {
        position: static;
        width: 30px;
        height: 30px;
      }

      .photo-tape {
        position: relative;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5px 14px 4px;
        overflow: hidden;
        color: var(--chalk);
        background:
          linear-gradient(100deg, rgba(255, 255, 255, 0.05), transparent 28%, rgba(255, 255, 255, 0.08) 58%, transparent),
          var(--tape);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.035),
          0 3px 7px rgba(0, 0, 0, 0.48);
        transform: skewX(-1deg);
        animation: tape-glow 4.5s ease-in-out infinite;
      }

      .photo-tape .chalk-text {
        font-size: 28px;
        line-height: 1.05;
        text-align: center;
      }

      .photo-room .chalk-text {
        font-family: "Caveat Brush", cursive;
        font-size: 36px;
      }

      .photo-time .chalk-text {
        font-size: 34px;
        font-weight: 700;
      }

      .screen-wipe {
        position: absolute;
        inset: 0;
        z-index: 6;
        pointer-events: none;
        background:
          linear-gradient(90deg, transparent, rgba(248, 248, 242, 0.18) 18%, rgba(248, 248, 242, 0.76) 48%, rgba(248, 248, 242, 0.12) 78%, transparent);
        opacity: 0;
        transform: translateX(-120%);
      }

      .frame.is-wiping .screen-wipe {
        animation: board-wipe 1.15s ease-in-out;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @keyframes wood-light {
        0%,
        100% {
          opacity: 0.62;
          transform: translateX(0);
        }
        50% {
          opacity: 0.92;
          transform: translateX(5px);
        }
      }

      @keyframes chalk-dust {
        0%,
        100% {
          opacity: 0.23;
          transform: translate(0, 0);
        }
        50% {
          opacity: 0.43;
          transform: translate(2px, -2px);
        }
      }

      @keyframes light-sweep {
        0%,
        100% {
          opacity: 0.08;
          transform: translateX(-36px);
        }
        50% {
          opacity: 0.22;
          transform: translateX(32px);
        }
      }

      @keyframes chalk-wobble {
        0%,
        100% {
          transform: translate(0, 0) rotate(-0.15deg);
          opacity: 0.94;
        }
        50% {
          transform: translate(1px, 1px) rotate(0.18deg);
          opacity: 1;
        }
      }

      @keyframes header-luma {
        0%,
        100% {
          filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        }
        50% {
          filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.32));
        }
      }

      @keyframes float-title {
        0%,
        100% {
          opacity: 0.86;
          transform: translate(-1px, 0) rotate(-0.18deg);
          filter: drop-shadow(0.45px 0 0 rgba(255, 255, 255, 0.62)) drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        }
        50% {
          opacity: 1;
          transform: translate(1.5px, -1.2px) rotate(0.18deg);
          filter: drop-shadow(0.45px 0 0 rgba(255, 255, 255, 0.8)) drop-shadow(0 0 3px rgba(255, 255, 255, 0.28));
        }
      }

      @keyframes float-badge {
        0%,
        100% {
          opacity: 0.82;
          transform: translate(0, 0) rotate(-1deg) scale(0.98);
          filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        }
        50% {
          opacity: 1;
          transform: translate(-1.5px, 1.5px) rotate(1.5deg) scale(1.04);
          filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.32));
        }
      }

      @keyframes float-podium {
        0%,
        100% {
          opacity: 0.88;
          transform: translate(0, 0) rotate(0.12deg);
          filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
        }
        50% {
          opacity: 1;
          transform: translate(1px, -1.5px) rotate(-0.12deg);
          filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.22));
        }
      }

      @keyframes ray-morph {
        0%,
        100% {
          stroke-width: 2.2;
          opacity: 0.48;
          transform: translate(0, 0) scaleX(0.78);
        }
        50% {
          stroke-width: 3.4;
          opacity: 1;
          transform: translate(2px, -1px) scaleX(1.18);
        }
      }

      @keyframes entry-drift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(2px, -1px);
        }
      }

      @keyframes tape-glow {
        0%,
        100% {
          filter: brightness(0.92);
        }
        50% {
          filter: brightness(1.12);
        }
      }

      @keyframes handwritten-pulse {
        0%,
        100% {
          opacity: 0.78;
          transform: skewX(-1deg);
        }
        50% {
          opacity: 1;
          transform: skewX(1deg);
        }
      }

      @keyframes icon-breathe {
        0%,
        100% {
          opacity: 0.72;
          transform: scale(0.96) rotate(-1deg);
        }
        50% {
          opacity: 1;
          transform: scale(1.08) rotate(1deg);
        }
      }

      @keyframes board-wipe {
        0% {
          opacity: 0;
          transform: translateX(-120%);
        }
        20%,
        65% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateX(120%);
        }
      }
    </style>
  </head>
  <body>
    <div class="fit-shell">
      <main class="frame" aria-labelledby="page-title">
        <h1 id="page-title" class="sr-only">Quadro de Recordes</h1>
        <section class="board">
          <header class="header" aria-hidden="true">
            <svg width="0" height="0">
              <defs>
                <filter id="chalky">
                  <feTurbulence baseFrequency="0.75" numOctaves="2" seed="8" type="fractalNoise" />
                  <feDisplacementMap in="SourceGraphic" scale="0.55" />
                </filter>
              </defs>
            </svg>

            <div class="title-row">
              <span class="title-arc">
                <svg viewBox="0 0 362 96">
                  <path id="title-arc-path" d="M 24 88 C 80 12, 282 12, 338 88" />
                  <text>
                    <textPath href="#title-arc-path" startOffset="24%" text-anchor="middle">QUADRO</textPath>
                  </text>
                  <text>
                    <textPath href="#title-arc-path" startOffset="80%" text-anchor="middle">RECORDES</textPath>
                  </text>
                </svg>
              </span>
              <span class="badge-mark">
                <svg viewBox="0 0 54 70">
                  <path class="medium" d="M27 3l5 9 10-3 2 10 8 6-7 7 5 10-11 2-4 10-9-6-10 5-1-11-10-5 8-8-3-10 11-1 6-15z" />
                  <circle class="thin" cx="27" cy="31" r="14" />
                  <path class="thin" d="M17 48l-8 20 13-9 6 10 7-21" />
                  <text x="27" y="37" font-size="19" font-weight="700" text-anchor="middle">DE</text>
                </svg>
              </span>
            </div>

            <div class="podium-mark">
              <svg viewBox="0 0 250 82">
                <rect class="podium-column podium-column-left" x="75" y="46" width="43" height="34">
                  <animate attributeName="y" values="46;28;55;46" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="height" values="34;52;25;34" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                </rect>
                <rect class="podium-column podium-column-middle" x="118" y="28" width="49" height="52">
                  <animate attributeName="y" values="28;55;46;28" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="height" values="52;25;34;52" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                </rect>
                <rect class="podium-column podium-column-right" x="167" y="55" width="43" height="25">
                  <animate attributeName="y" values="55;46;28;55" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="height" values="25;34;52;25" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                </rect>
                <text class="rank" x="142.5" y="20" text-anchor="middle">1
                  <animate attributeName="x" values="142.5;96.5;188.5;142.5" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="y" values="20;20;20;20" dur="9s" repeatCount="indefinite" />
                </text>
                <text class="rank" x="96.5" y="38" text-anchor="middle">2
                  <animate attributeName="x" values="96.5;188.5;142.5;96.5" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="y" values="38;38;38;38" dur="9s" repeatCount="indefinite" />
                </text>
                <text class="rank" x="188.5" y="47" text-anchor="middle">3
                  <animate attributeName="x" values="188.5;142.5;96.5;188.5" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1" />
                  <animate attributeName="y" values="47;47;47;47" dur="9s" repeatCount="indefinite" />
                </text>

                <line class="ray ray-left" x1="48" y1="26" x2="15" y2="8" />
                <line class="ray ray-left" x1="43" y1="44" x2="12" y2="43" />
                <line class="ray ray-left" x1="47" y1="61" x2="17" y2="74" />
                <line class="ray ray-right" x1="218" y1="26" x2="238" y2="10" />
                <line class="ray ray-right" x1="221" y1="44" x2="242" y2="43" />
                <line class="ray ray-right" x1="218" y1="61" x2="237" y2="73" />
              </svg>
            </div>
          </header>

          <section id="entries" class="entries" aria-label="Lista de recordes"></section>
          <section class="photo-view" aria-live="polite" aria-label="Foto da equipe recordista">
            <img id="record-photo" class="photo-image" alt="" />
            <h2 class="photo-title">RECORDE ATUAL</h2>
            <div class="photo-info">
              <div class="photo-row">
                <span class="icon-label photo-icon" aria-label="Sala">
                  <svg viewBox="0 0 32 32" aria-hidden="true">
                    <path d="M9 28V5h14v23" />
                    <path d="M13 28V9h10" />
                    <path d="M18 17h1" />
                    <path d="M6 28h20" />
                  </svg>
                </span>
                <span class="photo-tape photo-room"><span id="photo-room" class="chalk-text"></span></span>
              </div>
              <div class="photo-row">
                <span class="icon-label photo-icon" aria-label="Equipe">
                  <svg viewBox="0 0 32 32" aria-hidden="true">
                    <circle cx="16" cy="10" r="4" />
                    <path d="M9 27c1-6 3-9 7-9s6 3 7 9" />
                    <circle cx="7.5" cy="14" r="3" />
                    <circle cx="24.5" cy="14" r="3" />
                    <path d="M3 27c.7-4 2.3-6.5 5-7" />
                    <path d="M29 27c-.7-4-2.3-6.5-5-7" />
                  </svg>
                </span>
                <span class="photo-tape photo-team"><span id="photo-team" class="chalk-text"></span></span>
              </div>
              <div class="photo-row">
                <span class="icon-label photo-icon" aria-label="Tempo">
                  <svg viewBox="0 0 32 32" aria-hidden="true">
                    <circle cx="16" cy="18" r="10" />
                    <path d="M16 8V4" />
                    <path d="M12 4h8" />
                    <path d="M16 18v-6" />
                    <path d="M16 18l5 4" />
                  </svg>
                </span>
                <span class="photo-tape photo-time"><span id="photo-time" class="chalk-text"></span></span>
              </div>
            </div>
          </section>
          <span class="screen-wipe" aria-hidden="true"></span>
        </section>
      </main>
    </div>

    <template id="entry-template">
      <article class="entry">
        <span class="icon-label icon-room" aria-label="Sala">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <path d="M9 28V5h14v23" />
            <path d="M13 28V9h10" />
            <path d="M18 17h1" />
            <path d="M6 28h20" />
          </svg>
        </span>
        <span class="tape room-value"><span class="chalk-text" data-field="room"></span></span>
        <span class="icon-label icon-team" aria-label="Equipe">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="10" r="4" />
            <path d="M9 27c1-6 3-9 7-9s6 3 7 9" />
            <circle cx="7.5" cy="14" r="3" />
            <circle cx="24.5" cy="14" r="3" />
            <path d="M3 27c.7-4 2.3-6.5 5-7" />
            <path d="M29 27c-.7-4-2.3-6.5-5-7" />
          </svg>
        </span>
        <span class="tape team-value"><span class="chalk-text" data-field="team"></span></span>
        <span class="icon-label icon-time" aria-label="Tempo">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <circle cx="16" cy="18" r="10" />
            <path d="M16 8V4" />
            <path d="M12 4h8" />
            <path d="M16 18v-6" />
            <path d="M16 18l5 4" />
          </svg>
        </span>
        <span class="tape time-value"><span class="chalk-text" data-field="time"></span></span>
      </article>
    </template>

    <script>
      const artWidth = 450;
      const artHeight = 800;
      const boardDuration = 11000;
      const photoDuration = 6000;
      const transitionDuration = 1150;
      const fallbackRecords = [
        { id: "1", room: "Emboscada", team: "Vigil-Antes", time: "32:43", style: "plain" },
        { id: "2", room: "", team: "", time: "", style: "plain" },
        { id: "3", room: "Mundo Invertido", team: "Kuro-obi-pe", time: "27:26", style: "script" },
        { id: "4", room: "A Maldição Pirata", team: "Normal com Bacon", time: "42:26", style: "script" },
        { id: "5", room: "T-Vírus", team: "Só Domi", time: "39:29", style: "script" },
        { id: "6", room: "Wandinha", team: "Tramuz B12", time: "35:19", style: "script" },
        { id: "7", room: "Excalibur", team: "", time: "", style: "script" },
      ];
      let activePhotoRecords = [];
      let photoIndex = 0;
      let cycleTimer = 0;

      function fitBoard() {
        const viewport = window.visualViewport || window;
        const scale = Math.min(viewport.width / artWidth, viewport.height / artHeight);
        document.documentElement.style.setProperty("--art-scale", Math.max(scale, 0.1).toFixed(4));
      }

      function textFrom(node, selector) {
        return node.querySelector(selector)?.textContent.trim() || "";
      }

      function recordsFromXml(xml) {
        return [...xml.querySelectorAll("record")].map((record) => ({
          id: record.getAttribute("id") || textFrom(record, "id"),
          room: textFrom(record, "room"),
          team: textFrom(record, "team"),
          time: textFrom(record, "time"),
          style: record.getAttribute("style") || "script",
        }));
      }

      function applyTextFit(element, value, baseSize) {
        element.textContent = value;
        element.style.fontSize = `${baseSize}px`;
        requestAnimationFrame(() => {
          let size = baseSize;
          while (element.scrollWidth > element.clientWidth && size > 12) {
            size -= 1;
            element.style.fontSize = `${size}px`;
          }
        });
      }

      function renderRecords(records) {
        const entries = document.querySelector("#entries");
        const template = document.querySelector("#entry-template");
        entries.replaceChildren();
        records.slice(0, 7).forEach((record) => {
          const fragment = template.content.cloneNode(true);
          const article = fragment.querySelector(".entry");
          const roomTape = fragment.querySelector(".room-value");
          const room = fragment.querySelector('[data-field="room"]');
          const team = fragment.querySelector('[data-field="team"]');
          const time = fragment.querySelector('[data-field="time"]');
          roomTape.dataset.style = record.style || "script";
          applyTextFit(room, record.room, record.style === "plain" ? 22 : 31);
          applyTextFit(team, record.team, 21);
          applyTextFit(time, record.time, 21);
          if (!record.room && !record.team && !record.time) {
            article.classList.add("is-empty");
          }
          entries.appendChild(fragment);
        });
      }

      function isActivePhotoRecord(record) {
        const id = Number.parseInt(record.id, 10);
        return id >= 1 && id <= 7 && record.room.trim() && record.team.trim() && record.time.trim();
      }

      function setPhotoRecord(record) {
        const photo = document.querySelector("#record-photo");
        const room = document.querySelector("#photo-room");
        const team = document.querySelector("#photo-team");
        const time = document.querySelector("#photo-time");
        const id = Number.parseInt(record.id, 10);
        const candidates = [`fotos/${id}.jpeg`, `fotos/${id}.png`, `fotos/${id}.jpg`];
        let candidateIndex = 0;
        photo.onerror = () => {
          candidateIndex += 1;
          if (candidateIndex < candidates.length) {
            photo.src = candidates[candidateIndex];
          }
        };
        photo.src = candidates[candidateIndex];
        photo.alt = `Foto da equipe recordista da sala ${record.room}`;
        applyTextFit(room, record.room, record.style === "plain" ? 28 : 36);
        applyTextFit(team, record.team, 28);
        applyTextFit(time, record.time, 34);
      }

      function runWipe() {
        const frame = document.querySelector(".frame");
        frame.classList.remove("is-wiping");
        void frame.offsetWidth;
        frame.classList.add("is-wiping");
      }

      function showBoard() {
        const frame = document.querySelector(".frame");
        runWipe();
        window.setTimeout(() => {
          frame.classList.remove("show-photo");
          schedulePhotoCycle(boardDuration);
        }, transitionDuration * 0.45);
      }

      function showNextPhoto() {
        const frame = document.querySelector(".frame");
        const record = activePhotoRecords[photoIndex % activePhotoRecords.length];
        photoIndex += 1;
        setPhotoRecord(record);
        runWipe();
        window.setTimeout(() => {
          frame.classList.add("show-photo");
          cycleTimer = window.setTimeout(showBoard, photoDuration);
        }, transitionDuration * 0.45);
      }

      function schedulePhotoCycle(delay) {
        window.clearTimeout(cycleTimer);
        if (!activePhotoRecords.length) return;
        cycleTimer = window.setTimeout(showNextPhoto, delay);
      }

      function startPhotoCycle(records) {
        const frame = document.querySelector(".frame");
        activePhotoRecords = records.filter(isActivePhotoRecord);
        photoIndex = 0;
        window.clearTimeout(cycleTimer);
        frame.classList.remove("show-photo", "is-wiping");
        schedulePhotoCycle(boardDuration);
      }

      async function loadRecords() {
        try {
          const recordsUrl = new URL("records.xml", window.location.href);
          recordsUrl.searchParams.set("v", Date.now().toString());
          const response = await fetch(recordsUrl, { cache: "no-store" });
          if (!response.ok) throw new Error("records.xml não encontrado");
          const text = await response.text();
          const xml = new DOMParser().parseFromString(text, "application/xml");
          const records = recordsFromXml(xml);
          const sourceRecords = records.length ? records : fallbackRecords;
          renderRecords(sourceRecords);
          startPhotoCycle(sourceRecords);
        } catch (error) {
          renderRecords(fallbackRecords);
          startPhotoCycle(fallbackRecords);
        }
      }

      fitBoard();
      loadRecords();
      window.addEventListener("resize", fitBoard);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitBoard);
      }
    </script>
  </body>
</html>
